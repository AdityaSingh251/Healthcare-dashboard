<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Healthcare Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">

<h2 class="logo">Tech.Care</h2>

<ul id="patientList"></ul>

</div>



<!-- Main Dashboard -->
<div class="main">

<h2>Diagnosis History</h2>

<canvas id="bpChart"></canvas>

<div class="cards">

<div class="card blue">

<i class="fa-solid fa-lungs"></i>

<h3>Respiratory Rate</h3>

<p id="respiratoryRate"></p>

<span>Normal</span>

</div>



<div class="card pink">

<i class="fa-solid fa-temperature-three-quarters"></i>

<h3>Temperature</h3>

<p id="temperature"></p>

<span>Normal</span>

</div>



<div class="card purple">

<i class="fa-solid fa-heart"></i>

<h3>Heart Rate</h3>

<p id="heartRate"></p>

<span>Lower than Average</span>

</div>

</div>



<div class="diagnostic-container">

<h2>Diagnostic List</h2>

<table>
<thead>
<tr>
<th>Problem</th>
<th>Description</th>
<th>Status</th>
</tr>
</thead>

<tbody id="diagnosisList"></tbody>

</table>

</div>


<!-- Profile + Lab -->
<div class="profile">

<div class="profileCard">

<img id="profilePic" class="profile-pic" src="" alt="Patient Profile">
  
<h2 id="patientName"></h2>

<p><b>DOB:</b> <span id="dob"></span></p>

<p><b>Gender:</b> <span id="gender"></span></p>

<p><b>Phone:</b> <span id="phone"></span></p>

</div>



<div class="lab-results-container">

<h3>Lab Results</h3>

<ul id="labResults" class="lab-results-list"></ul>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
