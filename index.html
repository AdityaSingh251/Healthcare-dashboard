<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Healthcare Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="header">

<h2 class="logo">Tech.Care</h2>

<div class="nav">
<span>Overview</span>
<span class="active">Patients</span>
<span>Schedule</span>
<span>Message</span>
<span>Transactions</span>
</div>

</div>


<div class="container">


<!-- SIDEBAR -->

<div class="sidebar">

<h3>Patients</h3>

<ul id="patientsList"></ul>

</div>



<!-- MAIN -->

<div class="main">

<div class="card">

<h3>Diagnosis History</h3>

<canvas id="bpChart"></canvas>

<div class="bp-values">

<div>
<p>Systolic</p>
<h2 id="systolicValue"></h2>
</div>

<div>
<p>Diastolic</p>
<h2 id="diastolicValue"></h2>
</div>

</div>

</div>

</div>

<div class="metrics">

<div class="metric blue">

<h4>Respiratory Rate</h4>

<h2 id="resp"></h2>

</div>

<div class="metric pink">

<h4>Temperature</h4>

<h2 id="temp"></h2>

</div>

<div class="metric purple">

<h4>Heart Rate</h4>

<h2 id="heart"></h2>

</div>

</div>


<div class="card">

<h3>Diagnostic List</h3>

<table>

<thead>

<tr>

<th>Problem</th>

<th>Description</th>

<th>Status</th>

</tr>

</thead>

<tbody id="diagnosticList"></tbody>

</table>

</div>


</div>



<!-- PROFILE -->

<div class="profile">

<img id="profilePic">

<h2 id="name"></h2>

<p id="dob"></p>

<p id="gender"></p>

<p id="phone"></p>

<h3>Lab Results</h3>

<div id="labResults"></div>

</div>


</div>


<script src="script.js"></script>

</body>

</html>
