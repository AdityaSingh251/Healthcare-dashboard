<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthcare Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>Patients</h2>

<ul id="patientList"></ul>

</div>

<!-- Main Content -->
<div class="main">

<h2>Diagnosis History</h2>

<canvas id="bpChart"></canvas>

<div class="cards">

<div class="card">
<h3>Respiratory Rate</h3>
<p id="respRate"></p>
</div>

<div class="card">
<h3>Temperature</h3>
<p id="temperature"></p>
</div>

<div class="card">
<h3>Heart Rate</h3>
<p id="heartRate"></p>
</div>

</div>

<h2>Diagnostic List</h2>

<table>

<thead>
<tr>
<th>Problem</th>
<th>Description</th>
<th>Status</th>
</tr>
</thead>

<tbody id="diagnosticTable"></tbody>

</table>

</div>

<!-- Right Panel -->
<div class="profile">

<h2>Patient Info</h2>

<p><b>Name:</b> <span id="patientName"></span></p>
<p><b>DOB:</b> <span id="dob"></span></p>
<p><b>Gender:</b> <span id="gender"></span></p>
<p><b>Phone:</b> <span id="phone"></span></p>
<p><b>Insurance:</b> <span id="insurance"></span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
