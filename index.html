<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healthcare Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>

<div class="dashboard">

<!-- MAIN CONTENT -->

<div class="main">

<!-- DIAGNOSIS HISTORY CARD -->

<div class="chart-card">

<h2>Diagnosis History</h2>

<div class="bp-wrapper">

<!-- LEFT SIDE : CHART -->

<div class="bp-chart">

<h4>Blood Pressure</h4>

<canvas id="bpChart"></canvas>

</div>


<!-- RIGHT SIDE : VALUES -->

<div class="bp-stats">

<div class="bp-item">

<div class="bp-label">

<span class="dot systolic"></span>

Systolic

</div>

<h2 id="systolicValue">160</h2>

<p class="trend-up">▲ Higher than Average</p>

</div>


<div class="bp-item">

<div class="bp-label">

<span class="dot diastolic"></span>

Diastolic

</div>

<h2 id="diastolicValue">78</h2>

<p class="trend-down">▼ Lower than Average</p>

</div>

</div>

</div>

</div>


<!-- HEALTH CARDS -->

<div class="cards">

<div class="card blue">

<i class="fa-solid fa-lungs"></i>

<div>

<h4>Respiratory Rate</h4>

<p>20 bpm</p>

<span>Normal</span>

</div>

</div>


<div class="card pink">

<i class="fa-solid fa-thermometer-half"></i>

<div>

<h4>Temperature</h4>

<p>98.6°F</p>

<span>Normal</span>

</div>

</div>


<div class="card red">

<i class="fa-solid fa-heart"></i>

<div>

<h4>Heart Rate</h4>

<p>78 bpm</p>

<span>Lower than Average</span>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
